version: '3.8'

services:
    bot:
        build: .
        container_name: dummy-bot
        command: python -m bot
        restart: always
        env_file:
            - .env
        ports:
            - ${APP_PORT}:${APP_PORT}
        depends_on:
            - db

    db:
        image: postgres:latest
        restart: always
        environment:
            POSTGRES_DB: ${DB_NAME}
            POSTGRES_PORT: ${DB_PORT}
            POSTGRES_HOST_AUTH_METHOD: "scram-sha-256"
            POSTGRES_USER: ${DB_USER}
            POSTGRES_PASSWORD: ${DB_PASS}
        volumes:
            - ./postgres-data:/var/lib/postgresql/data
        ports:
            - ${DB_PORT}:${DB_PORT}

volumes:
    postgres-data:
